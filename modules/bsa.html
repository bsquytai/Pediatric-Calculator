<style>
    /* CSS Ép khung thu gọn chuẩn xác - Kế thừa Design System */
    .accordion-btn {
        width: 100%;
        text-align: left;
        background-color: var(--surface);
        color: var(--text);
        padding: 16px 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease;
        box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    
    .accordion-btn:hover { background-color: #f9fafb; }
    
    .accordion-btn.active { 
        background-color: var(--primary); 
        color: #ffffff;
        border-color: var(--primary);
        border-bottom-left-radius: 0; 
        border-bottom-right-radius: 0; 
        margin-bottom: 0;
    }

    .accordion-content {
        display: none; 
        padding: 20px;
        border: 1px solid var(--primary);
        border-top: none;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        margin-top: 0;
        margin-bottom: 16px;
        background-color: #f9fafb;
        animation: fadeIn 0.3s ease-in-out;
        box-sizing: border-box;
        width: 100%;
    }

    .accordion-content.show { display: block; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-5px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Form Layout - Thực chiến: Nặng trước, Cao sau */
    .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .form-col { flex: 1; display: flex; flex-direction: column; }
    .form-col label { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .form-col input, .form-col select { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; }

    .btn-sub-calc {
        width: 100%; padding: 10px; background-color: var(--primary-dark); color: white;
        border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
        margin-bottom: 14px; transition: background 0.2s;
    }
    .btn-sub-calc:hover { background-color: #1e3a8a; }

    /* Khung cảnh báo thiếu chỉ số */
    .insufficient-box {
        background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404;
        padding: 12px; border-radius: 6px; font-size: 13px; font-weight: 500; text-align: left;
    }

    .res-value-highlight { font-size: 24px; font-weight: bold; color: var(--primary-dark); margin: 10px 0; }
    
    /* Thiết kế bảng Z-score chuyên nghiệp */
    .zscore-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; background: #fff; }
    .zscore-table th, .zscore-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: left; vertical-align: top; }
    .zscore-table th { background-color: #f1f5f9; font-weight: 600; }
    
    .clinical-alert-box { padding: 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; margin-top: 12px; border-left: 4px solid #ccc; text-align: left; }
</style>

<div class="header">

</div>

        <div class="note" style="text-align: center;">Mở rộng phân hệ và bấm nút tính toán để xem kết quả.</div>
    </div>
</div>

<script>
    // Ma trận dữ liệu WHO mật độ cao để tránh sai số nội suy
    const whoMatrix = {
        male: [
            { m: 0,   w: {sd3N: 2.1, sd2N: 2.5, sd1N: 2.9, med: 3.3, sd1P: 3.9}, h: {sd3N: 44.2, sd2N: 46.1, sd1N: 48.0, med: 49.9, sd1P: 51.8}, bmi: {sd3N: 10.1, sd2N: 11.1, sd1N: 12.2, med: 13.4, sd1P: 14.8, sd2P: 16.3, sd3P: 18.1} },
            { m: 6,   w: {sd3N: 5.9, sd2N: 6.4, sd1N: 7.1, med: 7.9, sd1P: 8.8}, h: {sd3N: 61.0, sd2N: 63.3, sd1N: 65.5, med: 67.6, sd1P: 69.8}, bmi: {sd3N: 13.0, sd2N: 14.3, sd1N: 15.6, med: 17.0, sd1P: 18.5, sd2P: 20.1, sd3P: 22.0} },
            { m: 12,  w: {sd3N: 7.1, sd2N: 7.7, sd1N: 8.6, med: 9.6, sd1P: 10.8}, h: {sd3N: 68.6, sd2N: 71.0, sd1N: 73.4, med: 75.7, sd1P: 78.1}, bmi: {sd3N: 12.5, sd2N: 13.8, sd1N: 14.9, med: 16.1, sd1P: 17.4, sd2P: 18.8, sd3P: 20.5} },
            { m: 24,  w: {sd3N: 8.6, sd2N: 9.7, sd1N: 10.8, med: 12.2, sd1P: 13.8}, h: {sd3N: 78.0, sd2N: 81.0, sd1N: 84.1, med: 87.1, sd1P: 90.2}, bmi: {sd3N: 12.0, sd2N: 13.3, sd1N: 14.4, med: 15.5, sd1P: 16.7, sd2P: 18.0, sd3P: 19.5} },
            { m: 60,  w: {sd3N: 12.4, sd2N: 14.1, sd1N: 16.0, med: 18.3, sd1P: 21.0}, h: {sd3N: 96.1, sd2N: 100.7, sd1N: 105.3, med: 110.0, sd1P: 114.6}, bmi: {sd3N: 12.0, sd2N: 13.0, sd1N: 14.1, med: 15.3, sd1P: 16.8, sd2P: 18.3, sd3P: 20.0} },
            { m: 120, w: {sd3N: 20.2, sd2N: 23.6, sd1N: 27.8, med: 31.2, sd1P: 38.0}, h: {sd3N: 121.5, sd2N: 127.4, sd1N: 132.3, med: 137.8, sd1P: 144.0}, bmi: {sd3N: 12.2, sd2N: 13.5, sd1N: 14.8, med: 16.4, sd1P: 18.5, sd2P: 21.0, sd3P: 24.0} },
            { m: 180, w: {sd3N: 33.0, sd2N: 39.0, sd1N: 46.0, med: 56.7, sd1P: 66.0}, h: {sd3N: 147.0, sd2N: 154.0, sd1N: 163.0, med: 170.0, sd1P: 177.0}, bmi: {sd3N: 14.2, sd2N: 15.8, sd1N: 17.5, med: 19.6, sd1P: 22.2, sd2P: 25.5, sd3P: 29.5} }
        ],
        female: [
            { m: 0,   w: {sd3N: 2.0, sd2N: 2.4, sd1N: 2.8, med: 3.2, sd1P: 3.7}, h: {sd3N: 43.6, sd2N: 45.4, sd1N: 47.3, med: 49.1, sd1P: 51.0}, bmi: {sd3N: 9.8, sd2N: 10.9, sd1N: 12.0, med: 13.3, sd1P: 14.6, sd2P: 16.1, sd3P: 17.8} },
            { m: 6,   w: {sd3N: 5.3, sd2N: 5.8, sd1N: 6.5, med: 7.3, sd1P: 8.2}, h: {sd3N: 59.0, sd2N: 61.2, sd1N: 63.5, med: 65.7, sd1P: 68.0}, bmi: {sd3N: 12.5, sd2N: 13.9, sd1N: 15.2, med: 16.6, sd1P: 18.1, sd2P: 19.8, sd3P: 21.7} },
            { m: 12,  w: {sd3N: 6.3, sd2N: 7.1, sd1N: 8.0, med: 8.9, sd1P: 10.1}, h: {sd3N: 66.3, sd2N: 68.9, sd1N: 71.4, med: 74.0, sd1P: 76.6}, bmi: {sd3N: 12.0, sd2N: 13.5, sd1N: 14.6, med: 15.9, sd1P: 17.3, sd2P: 18.9, sd3P: 20.8} },
            { m: 24,  w: {sd3N: 8.1, sd2N: 9.0, sd1N: 10.2, med: 11.5, sd1P: 13.0}, h: {sd3N: 76.0, sd2N: 79.3, sd1N: 82.5, med: 85.7, sd1P: 88.9}, bmi: {sd3N: 11.8, sd2N: 13.0, sd1N: 14.1, med: 15.3, sd1P: 16.6, sd2P: 18.1, sd3P: 19.8} },
            { m: 60,  w: {sd3N: 11.8, sd2N: 13.7, sd1N: 15.8, med: 18.2, sd1P: 21.2}, h: {sd3N: 95.2, sd2N: 100.0, sd1N: 104.7, med: 109.4, sd1P: 114.1}, bmi: {sd3N: 11.5, sd2N: 12.7, sd1N: 13.9, med: 15.3, sd1P: 16.9, sd2P: 18.9, sd3P: 21.0} },
            { m: 120, w: {sd3N: 19.6, sd2N: 23.1, sd1N: 27.7, med: 31.9, sd1P: 40.0}, h: {sd3N: 121.2, sd2N: 127.3, sd1N: 133.0, med: 138.6, sd1P: 145.0}, bmi: {sd3N: 12.0, sd2N: 13.5, sd1N: 14.9, med: 16.6, sd1P: 18.8, sd2P: 21.7, sd3P: 25.0} },
            { m: 180, w: {sd3N: 33.6, sd2N: 39.3, sd1N: 46.4, med: 52.1, sd1P: 62.0}, h: {sd3N: 147.2, sd2N: 153.2, sd1N: 157.0, med: 161.8, sd1P: 167.0}, bmi: {sd3N: 14.0, sd2N: 16.1, sd1N: 17.8, med: 19.8, sd1P: 22.4, sd2P: 25.4, sd3P: 29.0} }
        ]
    };

    function interpolateWho(months, gender) {
        const list = whoMatrix[gender];
        if (months <= list[0].m) return list[0];
        if (months >= list[list.length - 1].m) return list[list.length - 1];
        
        for (let i = 0; i < list.length - 1; i++) {
            if (months >= list[i].m && months <= list[i+1].m) {
                const p1 = list[i]; const p2 = list[i+1];
                const ratio = (months - p1.m) / (p2.m - p1.m);
                const interp = (obj1, obj2) => {
                    let res = {};
                    for (let key in obj1) { res[key] = obj1[key] + ratio * (obj2[key] - obj1[key]); }
                    return res;
                };
                return { m: months, w: interp(p1.w, p2.w), h: interp(p1.h, p2.h), bmi: interp(p1.bmi, p2.bmi) };
            }
        }
    }

    function toggleAccordion(contentId, btn) {
        document.querySelectorAll('.accordion-content').forEach(content => {
            if (content.id !== contentId && content.classList.contains('show')) {
                content.classList.remove('show');
                const prevBtn = content.previousElementSibling;
                prevBtn.classList.remove('active');
                prevBtn.innerHTML = prevBtn.innerHTML.replace('[-]', '[+]');
            }
        });
        const content = document.getElementById(contentId);
        const isOpen = content.classList.contains('show');
        content.classList.toggle('show', !isOpen);
        btn.classList.toggle('active', !isOpen);
        btn.innerHTML = btn.innerHTML.replace(isOpen ? '[-]' : '[+]', isOpen ? '[+]' : '[-]');
    }

    function showMissingWarning(containerId, missingFields) {
        document.getElementById(containerId).innerHTML = `
            <div class="insufficient-box">
                ⚠️ <strong>Không đủ thông tin!</strong> Đại Hiệp vui lòng điền thêm: <strong>${missingFields.join(', ')}</strong> để thuật toán phân hệ này có thể hoạt động.
            </div>`;
    }

    function runBSA() {
        const inputs = getInputs(); let missing = [];
        if (isNaN(inputs.w)) missing.push("Cân nặng");
        if (isNaN(inputs.h)) missing.push("Chiều cao");
        if (missing.length > 0) { showMissingWarning("out-bsa", missing); return; }

        const bsa = Math.sqrt((inputs.h * inputs.w) / 3600);
        document.getElementById('out-bsa').innerHTML = `
            <div style="text-align: center; background: #fff; padding: 16px; border-radius: 6px; border: 1px solid var(--border);">
                <div style="font-size: 14px; color: var(--text-light); font-weight: 600;">DIỆN TÍCH BỀ MẶT CƠ THỂ (Mosteller)</div>
                <div class="res-value-highlight">${bsa.toFixed(2)} m²</div>
            </div>`;
    }

    // ==========================================
    // PHÂN HỆ 2: ĐÁNH GIÁ DINH DƯỠNG TOÀN DIỆN 
    // KHẮC PHỤC TRIỆT ĐỂ RANH GIỚI 5 TUỔI (60 THÁNG)
    // ==========================================
    function runWHO() {
        const inputs = getInputs(); let missing = [];
        if (isNaN(inputs.w)) missing.push("Cân nặng");
        if (isNaN(inputs.h)) missing.push("Chiều cao");
        if (isNaN(inputs.age)) missing.push("Tuổi");
        if (missing.length > 0) { showMissingWarning("out-who", missing); return; }

        const totalMonths = inputs.unit === 'years' ? (inputs.age * 12) : inputs.age;
        const curve = interpolateWho(totalMonths, inputs.gender);
        const actualBmi = inputs.w / Math.pow(inputs.h / 100, 2);

        let wfaZ = "", wfaEval = "", wfaColor = "#28a745";
        let hfaZ = "", hfaEval = "", hfaColor = "#28a745";
        let wfhZ = "", wfhEval = "", wfhColor = "#28a745";
        let bmiZ = "", bmiEval = "", bmiColor = "#28a745";

        // 1. CÂN NẶNG THEO TUỔI (WFA) - Giới hạn ≤ 10 tuổi (120 tháng)
        if (totalMonths > 120) {
            wfaZ = "N/A"; wfaEval = "Không áp dụng cho trẻ > 10 tuổi (biến thiên dậy thì)."; wfaColor = "var(--text-light)";
        } else {
            if (inputs.w < curve.w.sd3N) { wfaZ = "< -3 SD"; wfaEval = "Nhẹ cân mức độ nặng (Severe underweight)"; wfaColor = "#dc3545"; }
            else if (inputs.w < curve.w.sd2N) { wfaZ = "< -2 SD đến -3 SD"; wfaEval = "Nhẹ cân mức độ vừa (Moderate underweight)"; wfaColor = "#dc3545"; }
            else if (inputs.w < curve.w.sd1N) { wfaZ = "< -1 SD đến -2 SD"; wfaEval = "Nguy cơ nhẹ cân / Nhẹ cân mức độ nhẹ (Mild underweight)"; wfaColor = "#fd7e14"; }
            else if (inputs.w <= curve.w.sd1P) { wfaZ = "-1 SD đến +1 SD"; wfaEval = "Cân nặng bình thường (Eutrophy)"; }
            else { wfaZ = "> +1 SD"; wfaEval = "Cân nặng cao hơn chuẩn"; wfaColor = "#ffc107"; }
        }

        // 2. CHIỀU CAO THEO TUỔI (LFA/HFA)
        if (inputs.h < curve.h.sd3N) { hfaZ = "< -3 SD"; hfaEval = "Thấp còi mức độ nặng (Severe stunting)"; hfaColor = "#dc3545"; }
        else if (inputs.h < curve.h.sd2N) { hfaZ = "< -2 SD đến -3 SD"; hfaEval = "Thấp còi mức độ vừa (Moderate stunting)"; hfaColor = "#dc3545"; }
        else if (inputs.h < curve.h.sd1N) { hfaZ = "< -1 SD đến -2 SD"; hfaEval = "Nguy cơ thấp còi / Thấp còi mức độ nhẹ (Mild stunting)"; hfaColor = "#fd7e14"; }
        else if (inputs.h <= curve.h.sd1P) { hfaZ = "-1 SD đến +1 SD"; hfaEval = "Tăng trưởng tuyến tính bình thường"; }
        else { hfaZ = "> +1 SD"; hfaEval = "Chiều cao tốt"; hfaColor = "#28a745"; }

        // 3. CÂN NẶNG THEO CHIỀU CAO (WFL/WFH) - Áp dụng chặt chẽ cho trẻ ≤ 5 tuổi (≤ 60 tháng)
        // Đồng thời áp dụng chung tiêu chí phân độ cho BMI trẻ ≤ 5 tuổi 
        if (totalMonths > 60) {
            wfhZ = "N/A"; wfhEval = "Chỉ số WFL/WFH chỉ áp dụng tra cứu cho trẻ ≤ 5 tuổi (0-60 tháng)."; wfhColor = "var(--text-light)";
            
            // XỬ LÝ ĐỘC LẬP CHỈ SỐ BMI THEO TUỔI CHO TRẺ TRÊN 5 TUỔI (WHO 2007)
            if (actualBmi > curve.bmi.sd2P) { bmiZ = "> +2 SD"; bmiEval = "Béo phì (Obesity)"; bmiColor = "#dc3545"; }
            else if (actualBmi > curve.bmi.sd1P) { bmiZ = "> +1 SD đến +2 SD"; bmiEval = "Thừa cân (Overweight)"; bmiColor = "#ffc107"; }
            else if (actualBmi >= curve.bmi.sd1N) { bmiZ = "-1 SD đến +1 SD"; bmiEval = "Dinh dưỡng bình thường"; }
            else if (actualBmi >= curve.bmi.sd2N) { bmiZ = "< -1 SD đến -2 SD"; bmiEval = "Nguy cơ gầy còm (Mild thinness)"; bmiColor = "#fd7e14"; }
            else if (actualBmi >= curve.bmi.sd3N) { bmiZ = "< -2 SD đến -3 SD"; bmiEval = "Gầy còm (Thinness)"; bmiColor = "#dc3545"; }
            else { bmiZ = "< -3 SD"; bmiEval = "Gầy còm mức độ nặng (Severe thinness)"; bmiColor = "#dc3545"; }
        } else {
            // XỬ LÝ ĐỒNG BỘ WFH VÀ BMI CHO TRẺ DƯỚI/BẰNG 5 TUỔI (WHO 2006)
            if (actualBmi > curve.bmi.sd3P) {
                wfhZ = bmiZ = "> +3 SD"; 
                wfhEval = bmiEval = "Béo phì (Obesity)"; 
                wfhColor = bmiColor = "#dc3545";
            } else if (actualBmi > curve.bmi.sd2P) {
                wfhZ = bmiZ = "> +2 SD đến +3 SD"; 
                wfhEval = bmiEval = "Thừa cân (Overweight)"; 
                wfhColor = bmiColor = "#dc3545";
            } else if (actualBmi > curve.bmi.sd1P) {
                wfhZ = bmiZ = "> +1 SD đến +2 SD"; 
                wfhEval = bmiEval = "Nguy cơ thừa cân (Risk of overweight)"; 
                wfhColor = bmiColor = "#ffc107";
            } else if (actualBmi >= curve.bmi.sd1N) {
                wfhZ = bmiZ = "-1 SD đến +1 SD"; 
                wfhEval = bmiEval = "Bình thường"; 
            } else if (actualBmi >= curve.bmi.sd2N) {
                wfhZ = bmiZ = "< -1 SD đến -2 SD"; 
                wfhEval = bmiEval = "Nguy cơ gầy còm / Gầy còm nhẹ (Mild wasting)"; 
                wfhColor = bmiColor = "#fd7e14";
            } else if (actualBmi >= curve.bmi.sd3N) {
                wfhZ = bmiZ = "< -2 SD đến -3 SD"; 
                wfhEval = bmiEval = "Suy dinh dưỡng cấp tính vừa (MAM)"; 
                wfhColor = bmiColor = "#dc3545";
            } else {
                wfhZ = bmiZ = "< -3 SD"; 
                wfhEval = bmiEval = "Suy dinh dưỡng cấp tính nặng (SAM)"; 
                wfhColor = bmiColor = "#dc3545";
            }
        }

        // BIỆN LUẬN LÂM SÀNG NÂNG CAO - BẮT BỆNH LÝ "THẤP CÒI GÂY NHIỄU"
        let finalReport = "Bệnh nhi phát triển thể chất cân đối trong giới hạn chuẩn.";
        let boxStyle = "background-color: #f0fdf4; color: #15803d; border-left-color: #15803d;";
        
        if (inputs.w < curve.w.sd2N || inputs.h < curve.h.sd2N) {
            boxStyle = "background-color: #fef2f2; color: #b91c1c; border-left-color: #b91c1c;";
            if (inputs.h < curve.h.sd2N && (bmiEval.includes("Bình thường") || bmiEval.includes("Thừa cân"))) {
                finalReport = "🚨 <strong>BẪY LÂM SÀNG LƯU Ý:</strong> Bệnh nhi đang bị <strong>Suy dinh dưỡng thể thấp còi (Stunting) cấp độ từ vừa đến nặng</strong>. Do khung xương quá ngắn, chỉ số WFH và BMI bị tăng giả tạo thành 'Bình thường' hoặc 'Thừa cân'. Tuyệt đối không áp dụng chế độ giảm cân cho trẻ này mà cần ưu tiên phục hồi chiều cao cốt lõi!";
            } else {
                finalReport = "⚠️ <strong>CẢNH BÁO:</strong> Tình trạng suy dinh dưỡng (nhẹ cân hoặc thấp còi). Cần khảo sát thêm tiền sử dinh dưỡng và bệnh lý nền.";
            }
        } else if ((totalMonths <= 60 && actualBmi > curve.bmi.sd2P) || (totalMonths > 60 && actualBmi > curve.bmi.sd1P)) {
            boxStyle = "background-color: #fffbfa; color: #c2410c; border-left-color: #c2410c;";
            finalReport = "🔶 <strong>LƯU Ý ĐIỀU TRỊ:</strong> Bệnh nhi rơi vào phổ Thừa cân/Béo phì. Khi lên y lệnh truyền dịch hoặc các thuốc độc tính cao, vui lòng mở <strong>Phân hệ 3</strong> để lấy Cân nặng đích, tránh nguy cơ quá tải tim mạch do bù dịch thừa vào mô mỡ.";
        }

        document.getElementById('out-who').innerHTML = `
            <div style="background: #fff; padding: 14px; border-radius: 6px; border: 1px solid var(--border);">
                <table class="zscore-table">
                    <tr>
                        <th width="30%">Chỉ số đo lường</th>
                        <th width="20%">Mốc Z-Score WHO</th>
                        <th>Chẩn đoán Phân độ Lâm sàng</th>
                    </tr>
                    <tr style="color:${wfaColor}">
                        <td><strong>1. Cân nặng / Tuổi (WFA)</strong></td>
                        <td><strong>${wfaZ}</strong></td>
                        <td>${wfaEval}</td>
                    </tr>
                    <tr style="color:${hfaColor}">
                        <td><strong>2. Chiều cao / Tuổi (HFA)</strong></td>
                        <td><strong>${hfaZ}</strong></td>
                        <td>${hfaEval}</td>
                    </tr>
                    <tr style="color:${wfhColor}">
                        <td><strong>3. Cân nặng / Chiều cao (WFH)</strong></td>
                        <td><strong>${wfhZ}</strong></td>
                        <td>${wfhEval}</td>
                    </tr>
                    <tr style="color:${bmiColor}">
                        <td><strong>4. BMI / Tuổi (BMI-for-Age)</strong></td>
                        <td><strong>${bmiZ}</strong></td>
                        <td>${bmiEval}</td>
                    </tr>
                </table>
                <div class="clinical-alert-box" style="${boxStyle}">
                    ${finalReport}
                </div>
            </div>`;
    }

    // ==========================================
    // PHÂN HỆ 3: CÂN NẶNG ĐIỀU TRỊ CHÍNH XÁC (Cơ chế làm tròn 0.5)
    // ==========================================
    function runTreatmentWeight() {
        const inputs = getInputs(); let missing = [];
        if (isNaN(inputs.w)) missing.push("Cân nặng");
        if (isNaN(inputs.h)) missing.push("Chiều cao");
        if (isNaN(inputs.age)) missing.push("Tuổi");
        if (missing.length > 0) { showMissingWarning("out-treatment", missing); return; }

        const ageInYears = inputs.unit === 'months' ? (inputs.age / 12) : inputs.age;
        const currentBmi = inputs.w / Math.pow(inputs.h / 100, 2);

        let treatmentWeight = inputs.w; let explanation = "";

        if (inputs.h > 152) {
            let baseW = inputs.gender === 'male' ? 50 : 45;
            let inches = (inputs.h - 152) / 2.54;
            treatmentWeight = baseW + (Math.max(0, inches) * 2.3);
            explanation = `Bệnh nhi cao vượt trội (&gt;152cm). Khớp nối ma trận tĩnh người lớn. Cân nặng hồi sức lý tưởng đề xuất: <strong>${treatmentWeight.toFixed(1)} kg</strong>`;
        } else {
            // Khớp nối hoàn hảo từng dòng dữ liệu từ bức ảnh của bạn
            const aapBmiTable = {
                male: {
                    "2": [17.6, 18.2], "2.5": [17.1, 17.7], "3": [16.8, 17.3], "3.5": [16.6, 17.1], "4": [16.4, 16.9], "4.5": [16.3, 16.8],
                    "5": [16.3, 16.9], "5.5": [16.3, 16.9], "6": [16.4, 17.0], "6.5": [16.5, 17.2], "7": [16.6, 17.4], "7.5": [16.8, 17.7],
                    "8": [17.1, 18.0], "8.5": [17.3, 18.3], "9": [17.6, 18.6], "9.5": [17.9, 19.0], "10": [18.2, 19.4], "10.5": [18.6, 19.8],
                    "11": [18.9, 20.2], "11.5": [19.3, 20.6], "12": [19.7, 21.0], "12.5": [20.1, 21.4], "13": [20.4, 21.9], "13.5": [20.8, 22.3],
                    "14": [21.2, 22.7], "14.5": [21.6, 23.1], "15": [22.0, 23.5]
                },
                female: {
                    "2": [17.4, 18.0], "2.5": [16.9, 17.5], "3": [16.6, 17.2], "3.5": [16.4, 16.9], "4": [16.2, 16.8], "4.5": [16.1, 16.8],
                    "5": [16.1, 16.8], "5.5": [16.2, 16.9], "6": [16.3, 17.1], "6.5": [16.5, 17.3], "7": [16.7, 17.6], "7.5": [17.0, 18.0],
                    "8": [17.3, 18.3], "8.5": [17.6, 18.7], "9": [18.0, 19.1], "9.5": [18.3, 19.5], "10": [18.7, 20.0], "10.5": [19.1, 20.4],
                    "11": [19.5, 20.9], "11.5": [19.9, 21.3], "12": [20.2, 21.7], "12.5": [20.6, 22.2], "13": [21.0, 22.6], "13.5": [21.3, 23.0],
                    "14": [21.7, 23.3], "14.5": [22.0, 23.7], "15": [22.3, 24.0]
                }
            };

            // Cơ chế làm tròn tuổi về bước nhảy 0.5 để ăn khớp với bản đồ tra cứu của bạn
            let roundedAge = Math.round(ageInYears * 2) / 2;
            if (roundedAge < 2) roundedAge = 2; if (roundedAge > 15) roundedAge = 15;
            const ageKey = roundedAge.toString();

            const limits = aapBmiTable[inputs.gender][ageKey];
            const p75 = limits[0]; const p85 = limits[1];

            if (currentBmi <= p85) {
                treatmentWeight = inputs.w;
                explanation = `BMI trẻ (<strong>${currentBmi.toFixed(1)}</strong>) đang nằm dưới điểm cắt Thừa cân 85th (<strong>${p85}</strong>) của nhóm tuổi <strong>${ageKey}</strong>. Không lo ngại quá tải dịch. ➔ <strong>Giữ nguyên cân nặng để ra y lệnh: ${treatmentWeight} kg</strong>.`;
            } else {
                treatmentWeight = p75 * Math.pow(inputs.h / 100, 2);
                explanation = `⚠️ <strong>Hệ thống đã hiệu chỉnh trần chống quá tải dịch:</strong> BMI hiện tại (<strong>${currentBmi.toFixed(1)}</strong>) đã vượt mốc 85th (<strong>${p85}</strong>) của nhóm tuổi <strong>${ageKey}</strong>. Thuật toán tự động ép về mốc an toàn 75th (<strong>${p75}</strong>) để tính ngược ra Cân nặng hiệu chỉnh điều trị: <strong>${treatmentWeight.toFixed(1)} kg</strong>.`;
            }
        }

        document.getElementById('out-treatment').innerHTML = `
            <div style="background: #fff; padding: 16px; border-radius: 6px; border: 1px solid var(--border);">
                <div style="font-size: 14px; color: var(--text-light); font-weight: 600;">CÂN NẶNG AN TOÀN TRONG ĐIỀU TRỊ TRUYỀN DỊCH</div>
                <div class="res-value-highlight" style="color:#b91c1c;">${treatmentWeight.toFixed(1)} kg</div>
                <div class="note" style="text-align:left; margin-top:8px; line-height:1.4;">${explanation}</div>
            </div>`;
    }

    function getInputs() {
        return {
            w: parseFloat(document.getElementById('masterWeight').value),
            h: parseFloat(document.getElementById('masterHeight').value),
            age: parseFloat(document.getElementById('masterAge').value),
            unit: document.getElementById('masterAgeUnit').value,
            gender: document.getElementById('masterGender').value
        };
    }
</script>
