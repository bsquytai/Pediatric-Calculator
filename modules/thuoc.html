<style>
    /* Bổ sung CSS cục bộ để văn bản dài hiển thị đẹp, tự động xuống dòng */
    .drug-val {
        font-size: 15px; 
        color: var(--text);
        white-space: pre-line; /* Giữ nguyên định dạng xuống dòng nếu có trong JSON */
        line-height: 1.6;
    }
</style>

<div class="header">
    <h1>Tra cứu Thuốc</h1>
    <p>Cơ sở dữ liệu khoa Thận nhi</p>
</div>

<div class="search-wrapper">
    <input type="text" id="drugSearch" placeholder="Gõ tên thuốc (VD: captopril, enalapril...)" oninput="handleSearch()">
    <div id="drugSuggestions" class="suggestions-box"></div>
</div>

<div id="drugResultCard" class="card" style="display: none; border-top: 4px solid var(--primary);">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px;">
        <div>
            <h2 id="drName" style="color: var(--primary-dark); font-size: 22px; margin-bottom: 4px;">--</h2>
            <span id="drClass" class="badge bg-gray">--</span>
            <div id="drBrandNames" style="font-size: 13px; color: var(--text-light); margin-top: 8px; font-style: italic;">--</div>
        </div>
    </div>

    <div class="drug-detail-row">
        <div class="drug-lbl">Liều lượng & Chỉ định</div>
        <div class="drug-val" id="drDosing">--</div>
    </div>

    <div class="drug-detail-row">
        <div class="drug-lbl" style="color: var(--danger);">Chỉnh liều theo chức năng thận</div>
        <div class="drug-val" id="drRenal">--</div>
    </div>

    <div class="drug-detail-row">
        <div class="drug-lbl" style="color: var(--warning);">Tác dụng phụ</div>
        <div class="drug-val" id="drSideEffects">--</div>
    </div>

    <div class="drug-detail-row">
        <div class="drug-lbl" style="color: var(--danger);">Chống chỉ định</div>
        <div class="drug-val" id="drContraindications">--</div>
    </div>

    <div class="drug-detail-row">
        <div class="drug-lbl">Lưu ý lâm sàng</div>
        <div class="drug-val" id="drNote" style="font-style: italic;">--</div>
    </div>
</div>

<script>
    // Thuật toán xử lý tìm kiếm
    function handleSearch() {
        const query = document.getElementById('drugSearch').value.toLowerCase().trim();
        const sugBox = document.getElementById('drugSuggestions');
        sugBox.innerHTML = '';
        
        if (query.length < 2) { 
            sugBox.style.display = 'none'; 
            return; 
        }

        // Kiểm tra xem database từ index.html đã được nạp chưa
        if (typeof drugDatabase === 'undefined') {
            sugBox.innerHTML = '<div class="suggestion-item" style="color:var(--danger);">Lỗi: Chưa kết nối được data_thuoc.js</div>';
            sugBox.style.display = 'block';
            return;
        }

        // Lọc dữ liệu thông minh (Tìm theo tên, nhóm thuốc, hoặc biệt dược)
        const matches = drugDatabase.filter(d => 
            (d.name && d.name.toLowerCase().includes(query)) || 
            (d.class && d.class.toLowerCase().includes(query)) ||
            (d.brand_names && d.brand_names.toLowerCase().includes(query))
        );

        if (matches.length === 0) {
            sugBox.innerHTML = '<div class="suggestion-item" style="color:var(--text-light);">Không tìm thấy thuốc phù hợp...</div>';
            sugBox.style.display = 'block';
            return;
        }

        // Đổ danh sách gợi ý ra màn hình
        matches.forEach(drug => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerHTML = `<strong>${drug.name}</strong> <br><span style="font-size:12px; color:var(--text-light);">${drug.class}</span>`;
            // Khi người dùng click vào gợi ý
            div.onclick = () => displayDrugProfile(drug);
            sugBox.appendChild(div);
        });
        
        sugBox.style.display = 'block';
    }

    // Thuật toán hiển thị Thẻ thông tin thuốc
    function displayDrugProfile(drug) {
        // Cập nhật thanh tìm kiếm & ẩn dropdown
        document.getElementById('drugSearch').value = drug.name;
        document.getElementById('drugSuggestions').style.display = 'none';

        // Đổ dữ liệu cơ bản
        document.getElementById('drName').innerText = drug.name || 'Chưa rõ tên';
        document.getElementById('drClass').innerText = drug.class || 'Chưa phân nhóm';
        
        // Xử lý Biệt dược (Nếu không có trong DB thì tự động ẩn)
        const brandEl = document.getElementById('drBrandNames');
        if (drug.brand_names) {
            brandEl.innerText = `Biệt dược: ${drug.brand_names}`;
            brandEl.style.display = 'block';
        } else {
            brandEl.style.display = 'none';
        }

        // Hàm nội bộ để ánh xạ và tự động ẩn/hiện các hàng (rows)
        const setDetail = (id, val) => {
            const el = document.getElementById(id);
            if (val && val.trim() !== "") {
                el.innerText = val;
                el.parentElement.style.display = 'flex'; // Hiện hàng này lên
            } else {
                el.parentElement.style.display = 'none'; // Giấu hàng này đi nếu JSON không có dữ liệu
            }
        };

        // Ánh xạ toàn bộ dữ liệu từ JSON vào HTML
        setDetail('drDosing', drug.dosing);
        setDetail('drRenal', drug.renal_adj);
        setDetail('drSideEffects', drug.side_effects);
        setDetail('drContraindications', drug.contraindications);
        setDetail('drNote', drug.note);

        // Hiển thị thẻ Card với hiệu ứng
        const card = document.getElementById('drugResultCard');
        card.style.display = 'block';
        card.style.animation = 'none';
        // Kích hoạt lại hiệu ứng fadeIn
        setTimeout(() => card.style.animation = 'fadeIn 0.4s ease', 10);
    }

    // Lắng nghe sự kiện click ra ngoài để đóng hộp gợi ý
    document.addEventListener('click', function(e) {
        const searchInput = document.getElementById('drugSearch');
        const sugBox = document.getElementById('drugSuggestions');
        if (searchInput && sugBox && !searchInput.contains(e.target)) {
            sugBox.style.display = 'none';
        }
    });
</script>
